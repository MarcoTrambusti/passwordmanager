name: Java CI with Maven and Docker in Windows

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 7 * * 0"

jobs:
  build:
    runs-on: windows-latest
    env:
      DOCKER_HOST: tcp://localhost:2375

    name: Build in Windows
    steps:
    - uses: actions/checkout@v2

    - name: Set up JDK 8
      uses: actions/setup-java@v1
      with:
        java-version: 1.8

    - name: Setup WSL
      uses: Vampire/setup-wsl@v3
      with:
        distribution: 'Ubuntu-20.04'
        update: true
        additional-packages: 'docker.io'

    - name: Install Docker in WSL
      run: |
        wsl -- sudo apt-get update
        wsl -- sudo apt-get install -y docker.io

    - name: Start Docker service in WSL
      run: |
        wsl -- sudo dockerd &
        sleep 10
        wsl -- export DOCKER_HOST=tcp://localhost:2375 
        
    - name: Cache Maven packages
      uses: actions/cache@v2
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml', '**/*.yml') }}
        restore-keys: ${{ runner.os }}-m2-

    - name: Build with Maven
      run: mvn -f pom.xml verify
